name: Deploy to Hostinger

on:
  push:
    branches:
      - main  # or master, depending on your default branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.5.3
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}  # You'll need to add this to your GitHub secrets

    - name: Deploy to VPS
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
        "cd ${{ secrets.VPS_PATH }} && \
         git init && \
         git remote add origin https://github.com/SuporteAnymarket/App-Proativo.git || true && \
         git fetch origin && \
         git branch -M main || true && \
         git reset --hard origin/main && \
         python3 -m venv venv && \
         . venv/bin/activate && \
         pip install -r requirements.txt && \
         npm install && \
         npm run build && \
         pm2 delete all || true && \
         pm2 start ecosystem.config.js"
 
